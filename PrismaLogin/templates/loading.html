<!DOCTYPE html>
<html>
<head>
    <title>Prisma Login – Lade…</title>
    <style>
        body { font-family: Arial; text-align:center; padding-top:150px; background:#f0f0f0; }
        .loader { border:10px solid #f3f3f3; border-top:10px solid #4b8df8; border-radius:50%; width:80px; height:80px; animation:spin 1s linear infinite; margin:auto; }
        @keyframes spin { 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }
        h2 { margin-top:20px; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <h2>Server wird gestartet… bitte kurz warten</h2>
    <p>In wenigen Sekunden bist du auf der Prisma Login Seite.</p>

    <script>
        setTimeout(function(){ window.location.href="/login"; }, 5000);
    </script>
</body>
</html>
