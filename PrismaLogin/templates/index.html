<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

body{
background:#f2f2f2;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
width:300px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#4CAF50;
border:none;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

a{
display:block;
text-align:center;
margin-top:10px;
}

</style>

</head>

<body>

<div class="box">

<h2>Login</h2>

<form method="POST">

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Passwort" required>

<button type="submit">Login</button>

</form>

<a href="/register">Registrieren</a>

</div>

</body>
</html>
